name: Generate & Publish Documentation

on:
  push:
    branches: [ integration ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Swagger / OpenAPI (from .NET build)
  # ─────────────────────────────────────────────
  swagger:
    name: Generate Swagger JSON
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore and Build
        run: |
          dotnet restore
          dotnet build -c Release --no-restore

      - name: Generate Swagger using custom generator
        run: |
          mkdir -p docs/api
          cd GenshinDataApp.Services/bin/Release/net10.0
          
          # Ejecutar el generador personalizado
          dotnet GenshinDataApp.Services.dll --generate-swagger || echo "Custom generator failed"
          
          # Mover el archivo generado
          if [ -f swagger.json ]; then
            mv swagger.json ../../../../docs/api/swagger.json
            echo "✓ Swagger generated with custom generator"
          fi
        continue-on-error: true

      - name: Create placeholder if generation failed
        run: |
          if [ ! -f docs/api/swagger.json ]; then
            echo "⚠ Swagger generation failed, creating placeholder"
            mkdir -p docs/api
            echo '{"openapi":"3.0.1","info":{"title":"GenshinDataApp API","version":"v1","description":"API documentation (auto-generation in progress)"},"paths":{}}' > docs/api/swagger.json
          else
            echo "✓ Swagger JSON exists"
            ls -lh docs/api/swagger.json
            head -n 20 docs/api/swagger.json
          fi

      - name: Upload swagger artifact
        uses: actions/upload-artifact@v4
        with:
          name: swagger-json
          path: docs/api/swagger.json

  # ─────────────────────────────────────────────
  # JOB 2 — DocFX (.NET C# code documentation)
  # ─────────────────────────────────────────────
  docfx:
    name: Generate DocFX Backend Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Restore & Build (needed for DocFX metadata)
        run: |
          dotnet restore GenshinDataApp.Backend/GenshinDataApp.Backend.csproj
          dotnet build GenshinDataApp.Backend/GenshinDataApp.Backend.csproj --no-restore

      - name: Generate DocFX docs
        run: docfx GenshinDataApp.Backend/docfx.json --output docs/backend

      - name: Upload DocFX artifact
        uses: actions/upload-artifact@v4
        with:
          name: docfx-site
          path: docs/backend

  # ─────────────────────────────────────────────
  # JOB 3 — Compodoc (Angular frontend docs)
  # ─────────────────────────────────────────────
  compodoc:
    name: Generate Compodoc Frontend Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: GenshinDataApp.Frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd GenshinDataApp.Frontend
          npm ci

      - name: Generate Compodoc docs
        run: |
          cd GenshinDataApp.Frontend
          npx @compodoc/compodoc -p tsconfig.doc.json -d ../docs/frontend --disablePrivate --disableInternal

      - name: Upload Compodoc artifact
        uses: actions/upload-artifact@v4
        with:
          name: compodoc-site
          path: docs/frontend

  # ─────────────────────────────────────────────
  # JOB 4 — Publish all docs to GitHub Pages
  # ─────────────────────────────────────────────
  publish:
    name: Publish to GitHub Pages
    runs-on: ubuntu-latest
    needs: [ swagger, docfx, compodoc ]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: gh-pages-content

      - name: Assemble docs folder
        run: |
          mkdir -p public/api public/backend public/frontend
          cp -r gh-pages-content/swagger-json/*   public/api/    || true
          cp -r gh-pages-content/docfx-site/*     public/backend/ || true
          cp -r gh-pages-content/compodoc-site/*  public/frontend/ || true

      - name: Create index page
        run: |
          cat > public/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8"/>
            <meta name="robots" content="noindex,nofollow"/>
            <title>GenshinDataApp — Developer Documentation</title>
            <style>
              body { font-family: Arial, sans-serif; max-width: 700px; margin: 60px auto; padding: 0 20px; background: #0d1117; color: #e8dfc8; }
              h1   { color: #FFD700; border-bottom: 1px solid #333; padding-bottom: 12px; }
              h2   { color: #4A9EFF; margin-top: 30px; }
              a    { color: #4A9EFF; text-decoration: none; }
              a:hover { text-decoration: underline; }
              .card { background: #131b27; border: 1px solid #FFD70033; border-radius: 8px; padding: 20px; margin: 12px 0; }
              footer { margin-top: 60px; font-size: 12px; color: #555; border-top: 1px solid #222; padding-top: 16px; }
            </style>
          </head>
          <body>
            <h1>GenshinDataApp — Developer Docs</h1>
            <p>Auto-generated documentation. Updated on every push to <code>integration</code> branch.</p>

            <div class="card">
              <h2>🔌 REST API — Swagger</h2>
              <p>Interactive API documentation. Browse and test all endpoints.</p>
              <a href="./api/swagger.json">swagger.json</a>
            </div>

            <div class="card">
              <h2>⚙️ Backend — DocFX</h2>
              <p>.NET Core C# code documentation. All classes, interfaces and methods.</p>
              <a href="./backend/">Open DocFX docs →</a>
            </div>

            <div class="card">
              <h2>🅰️ Frontend — Compodoc</h2>
              <p>Angular application documentation. Components, services, routes and dependency graph.</p>
              <a href="./frontend/">Open Compodoc docs →</a>
            </div>

            <footer>
              GenshinDataApp — Unofficial fan-made project.<br/>
              Not affiliated with HoYoverse. Genshin Impact™ © HoYoverse Co., Ltd. All rights reserved.
            </footer>
          </body>
          </html>
          HTML

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          commit_message: "docs: auto-generated documentation [skip ci]"